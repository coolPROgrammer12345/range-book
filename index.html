<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Range Book — Golf Practice Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --turf-dark:#182620;
    --fairway:#4A7C59;
    --sand:#DCCEA8;
    --paper:#FAF6EC;
    --flag:#B23A2E;
    --white:#FFFDF8;
    --ink-soft:#5B6B5C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--turf-dark);
    color:var(--white);
    font-family:'Source Sans 3', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .landing{
    max-width:480px;
    width:100%;
    padding:48px 32px;
    text-align:center;
  }
  .flagpole{font-size:48px;margin-bottom:8px;}
  h1{
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.03em;
    font-size:2.4rem;
    margin:0 0 4px;
    border-bottom:4px solid var(--flag);
    padding-bottom:16px;
    display:inline-block;
  }
  .tagline{color:var(--sand);margin:16px 0 28px;font-size:1.05rem;}
  ul{
    list-style:none;
    padding:0;
    margin:0 0 32px;
    text-align:left;
    color:var(--ink-soft);
    background:rgba(255,253,248,0.05);
    border-radius:10px;
    padding:20px 24px;
  }
  li{margin:8px 0;color:var(--white);font-size:0.95rem;}
  li::before{content:'⛳ ';}
  .launch-btn{
    display:inline-block;
    background:var(--flag);
    color:var(--white);
    text-decoration:none;
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.05em;
    font-weight:600;
    padding:16px 40px;
    border-radius:8px;
    font-size:1.05rem;
    transition:opacity 0.15s;
  }
  .launch-btn:hover{opacity:0.85;}
  .note{margin-top:20px;font-size:0.8rem;color:var(--ink-soft);}
</style>
</head>
<body>
  <div class="landing">
    <div class="flagpole">⛳</div>
    <h1>Range Book</h1>
    <p class="tagline">practice · track · improve</p>
    <ul>
      <li>Putting, Chipping &amp; Driver drills with skill-tier goals</li>
      <li>Log sessions and track your history &amp; streaks</li>
      <li>Find nearby courses and driving ranges</li>
    </ul>
    <a class="launch-btn" href="range-book.html">Launch App →</a>
    <p class="note">Runs entirely in your browser. Your data stays on your device.</p>
  </div>
</body>
</html>
